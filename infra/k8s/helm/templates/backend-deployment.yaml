apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "softwarecatalogus.fullname" . }}-backend
  labels:
    app.kubernetes.io/component: backend
    {{- include "softwarecatalogus.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      {{- include "softwarecatalogus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: backend
        {{- include "softwarecatalogus.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.backend.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.envFromSecret }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/v1/pakketten/?page_size=1
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/pakketten/?page_size=1
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: static
              mountPath: /app/staticfiles
            - name: tmp
              mountPath: /tmp
      initContainers:
        - name: migrate
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          command: ["python", "manage.py", "migrate", "--no-input"]
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.backend.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.envFromSecret }}
          {{- end }}
        - name: collectstatic
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          command: ["python", "manage.py", "collectstatic", "--no-input"]
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.backend.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.envFromSecret }}
          {{- end }}
          volumeMounts:
            - name: static
              mountPath: /app/staticfiles
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "softwarecatalogus.fullname" . }}-media
        - name: static
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "softwarecatalogus.fullname" . }}-backend
  labels:
    app.kubernetes.io/component: backend
    {{- include "softwarecatalogus.labels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/component: backend
    {{- include "softwarecatalogus.selectorLabels" . | nindent 4 }}
