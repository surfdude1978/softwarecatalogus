apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "softwarecatalogus.fullname" . }}-celery-worker
  labels:
    app.kubernetes.io/component: celery-worker
    {{- include "softwarecatalogus.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.celeryWorker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: celery-worker
      {{- include "softwarecatalogus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: celery-worker
        {{- include "softwarecatalogus.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: celery-worker
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          command: ["celery", "-A", "config.celery", "worker", "--loglevel=info", "--concurrency=2"]
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.backend.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.envFromSecret }}
          {{- end }}
          resources:
            {{- toYaml .Values.celeryWorker.resources | nindent 12 }}
          volumeMounts:
            - name: media
              mountPath: /app/media
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "softwarecatalogus.fullname" . }}-media
        - name: tmp
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "softwarecatalogus.fullname" . }}-celery-beat
  labels:
    app.kubernetes.io/component: celery-beat
    {{- include "softwarecatalogus.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.celeryBeat.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: celery-beat
      {{- include "softwarecatalogus.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: celery-beat
        {{- include "softwarecatalogus.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: celery-beat
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          command: ["celery", "-A", "config.celery", "beat", "--loglevel=info", "--scheduler=django_celery_beat.schedulers:DatabaseScheduler"]
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          {{- if .Values.backend.envFromSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.envFromSecret }}
          {{- end }}
          resources:
            {{- toYaml .Values.celeryBeat.resources | nindent 12 }}
