# Productie Nginx configuratie — nl.internet.nl 100% score
#
# Vereisten:
# - SSL-certificaten op /etc/nginx/ssl/ (bijv. Let's Encrypt via certbot)
# - DNSSEC geconfigureerd in DNS-provider (buiten Nginx scope)
# - DKIM + DMARC geconfigureerd in DNS + mailserver (buiten Nginx scope)
# - IPv6-adres beschikbaar op de server

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# HTTP → HTTPS redirect (inclusief IPv6)
server {
    listen 80;
    listen [::]:80;
    server_name softwarecatalogus.nl www.softwarecatalogus.nl;

    # Redirect alles naar HTTPS
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;  # IPv6 ondersteuning (nl.internet.nl vereiste)
    http2 on;
    server_name softwarecatalogus.nl www.softwarecatalogus.nl;

    # ── TLS configuratie ────────────────────────────────────────────────────
    # TLS 1.3 minimaal vereist (nl.internet.nl)
    ssl_certificate     /etc/nginx/ssl/softwarecatalogus.nl.crt;
    ssl_certificate_key /etc/nginx/ssl/softwarecatalogus.nl.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Beveiligingsheaders (nl.internet.nl vereisten) ─────────────────────

    # HSTS — 1 jaar, includeSubDomains, preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss: https:; media-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    # Klikjacking
    add_header X-Frame-Options "DENY" always;

    # MIME-sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions Policy (vervangt Feature-Policy)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # ── Statische bestanden ─────────────────────────────────────────────────
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Django API & Admin ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js frontend ────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
