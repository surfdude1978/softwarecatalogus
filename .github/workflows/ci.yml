name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ====================
  # Backend tests
  # ====================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: softwarecatalogus_test
          POSTGRES_USER: swc
          POSTGRES_PASSWORD: swc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U swc -d softwarecatalogus_test -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12 opzetten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Dependencies installeren
        run: |
          cd backend
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (Ruff)
        run: |
          cd backend
          ruff check .
          ruff format --check .

      - name: Type check (mypy)
        run: |
          cd backend
          mypy apps/ --ignore-missing-imports
        continue-on-error: true

      - name: Tests draaien
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
          SECRET_KEY: test-secret-key-not-for-production
          POSTGRES_DB: softwarecatalogus_test
          POSTGRES_USER: swc
          POSTGRES_PASSWORD: swc
          POSTGRES_HOST: localhost
          POSTGRES_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          MEILISEARCH_URL: http://localhost:7700
          MEILISEARCH_API_KEY: test_key
        run: |
          cd backend
          pytest tests/ -v --tb=short --cov=apps --cov-report=xml --cov-report=term-missing

      - name: Coverage uploaden
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ====================
  # Frontend tests
  # ====================
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 20 opzetten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Dependencies installeren
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Type check
        run: |
          cd frontend
          npm run type-check

      - name: Tests draaien
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false

      - name: Build controleren
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ====================
  # Docker build
  # ====================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - context: backend
            image: softwarecatalogus-backend
          - context: frontend
            image: softwarecatalogus-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildx opzetten
        uses: docker/setup-buildx-action@v3

      - name: Inloggen bij GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker image bouwen en pushen
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ====================
  # Security scan
  # ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12 opzetten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Dependencies installeren
        run: |
          cd backend
          pip install -r requirements.txt safety bandit

      - name: Safety check (bekende kwetsbaarheden)
        run: |
          cd backend
          safety check -r requirements.txt
        continue-on-error: true

      - name: Bandit security linter
        run: |
          cd backend
          bandit -r apps/ -ll -ii
        continue-on-error: true
