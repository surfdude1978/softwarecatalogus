[tool:pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*

[coverage:run]
source = apps
omit =
    # Data-migratie en seed scripts (eenmalige admin-tools, geen unit tests)
    apps/core/management/commands/seed_data.py
    apps/migratie/management/commands/migrate_from_drupal.py
    apps/architectuur/management/commands/import_gemma.py
    apps/pakketten/management/commands/reindex_search.py
    apps/aanbestedingen/management/commands/sync_aanbestedingen.py
    # Django-gegenereerde bestanden
    apps/*/migrations/*.py
    apps/*/apps.py
    apps/*/__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod
